name: Quote Block
context:
  quote: I didn't know anything about the Japanese military, so I had to study very hard. Head Instructor John Aiso hounded me. At first I got frustrated. I would ask a question, and his explanation would be even worse than the original problem. Later, he told me, "If I gave you a pat answer, you wouldn't learn anything. By pushing you, you're forced to get that much better." He was a good man. He really worked on me”
  attribution: James McDoodle
