name: Hero split
context:
  hero:
    title: Bad Day at Black Rock
    type: Film
    introduction: Critically acclaimed 1955 movie starring Spencer Tracy whose plot is built around the murder of the Issei father of a Nisei war hero in a forlorn desert town and its subsequent cover up. Though it was one of the first movies to note the discrimination Japanese Americans faced during World War II, no Japanese American characters appear in it. Bad Day at Black Rock was nominated for three Academy Awards.
