{% extends "base.html" %}
{% load static %}

{% block body_class %}template-information-page{% endblock %}

{% block content %}
<div class="grid">

    <h1>Contents</h1>

    <p>
        {% for heading in headings %}
        {% if heading.size != 'h2' %}&mdash;{% endif %}
        <a href="{{ heading.url }}">{{ heading.heading_text }}</a></br>
        {% endfor %}
    </p>

</div><!-- /grid -->
{% endblock content %}
