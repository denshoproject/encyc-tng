        modal:
          id: modal-1
          open: false
          title: Discover the history of the Japanese American incarceration during WWII
          content: |
            <p>The Japanese American incarceration during WWII was a dark chapter in American history. Over 120,000 Japanese Americans were forcibly removed from their homes and sent to concentration camps. This was a violation of their civil rights and a betrayal of the values of freedom and democracy that the United States stands for.</p>
