name: Hero
context:
  content: <p>The Tule Lake site is located in Modoc County, California, near the California-Oregon border, about forty miles southeast of Klamath Falls, Oregon and 10 miles south of the town of Tulelake. The area has an elevation of 4,000 feet above sea level, with flat and treeless terrain and sparse vegetation—mostly grass, tules, and sagebrush—growing in sandy, loamy soil scattered with tiny white shells from freshwater mollusks that once thrived in the shallow lake waters. Winters are long and cold and summers hot and dry, although the climate is considered relatively mild for a War Relocation Authority (WRA) site.</p>
